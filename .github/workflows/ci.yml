name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false
      - run: go test -race ./...
      - run: go vet ./...
      - run: go run ./cmd/simulator -tasks 1000 -workers 32 -fault-every 25
